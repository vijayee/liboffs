name: off_client
description: OFF System desktop client
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  file_picker: ^8.0.0
  path_provider: ^2.1.0
  url_launcher: ^6.2.0
  cbor: ^6.5.1
  qr: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Odin
      fonts:
        - asset: assets/fonts/Odin Rounded - Bold.otf